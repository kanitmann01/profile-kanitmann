name: Fable 5 Nightly Crawl

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  fable5-crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx tsx scripts/crawl-sources.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
