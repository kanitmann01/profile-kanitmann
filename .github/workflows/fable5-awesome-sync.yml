name: Fable 5 Awesome List Sync

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  fable5-awesome-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/parse-awesome-list.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
